name: Update Neocities Counter

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions: write-all
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fetch Neocities info
        run: curl -s "https://neocities.org/api/info?sitename=typhe" -o data.json

      - name: Update views.json
        run: python3 -c "import json; data=json.load(open('data.json')); json.dump({'info':{'views':data['info']['views']}}, open('views.json','w'), indent=2)"
      
      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add views.json
          git diff --cached --quiet || git commit -m "Update views.json"
          git push origin HEAD
